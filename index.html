<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a0d38" />
    <title>Happy Birthday, Shruti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@600;700;800&family=Patrick+Hand&family=Caveat:wght@500;700&family=Nunito:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" aria-live="polite">
      <div class="nebula nebula-a" aria-hidden="true"></div>
      <div class="nebula nebula-b" aria-hidden="true"></div>
      <div class="nebula nebula-c" aria-hidden="true"></div>
      <canvas id="space-canvas" aria-hidden="true"></canvas>

      <section class="card-stage" id="card-stage">
        <article class="card peek peek-back" aria-hidden="true">
          <div class="polaroid">
            <div class="polaroid-photo peek-photo"></div>
            <div class="polaroid-caption"><span class="handwrite">&#9829;</span></div>
          </div>
        </article>
        <article class="card peek peek-mid" aria-hidden="true">
          <div class="polaroid">
            <div class="polaroid-photo peek-photo alt"></div>
            <div class="polaroid-caption"><span class="handwrite">&#10024;</span></div>
          </div>
        </article>
        <article
          id="card"
          class="card active"
          role="button"
          tabindex="0"
          aria-label="Tap left to go back, tap right for next"
        >
          <div class="polaroid">
            <div class="polaroid-photo" id="card-content">
              <div class="loading-view">
                <div class="sparkle-ring" aria-hidden="true"></div>
                <h1 class="cartoon-title">Loading your surprise</h1>
                <p class="cartoon-body">Warming up music, chats, and memories...</p>
                <div class="loader-wrap">
                  <div class="loader-track">
                    <span id="loader-bar" class="loader-bar"></span>
                  </div>
                  <p class="loader-text"><span id="loader-percent">0%</span></p>
                </div>
              </div>
            </div>
            <div class="polaroid-caption">
              <span class="tape tape-left" aria-hidden="true"></span>
              <span class="handwrite" id="card-caption">for you &#9829;</span>
              <span class="tape tape-right" aria-hidden="true"></span>
            </div>
          </div>
          <div class="tap-zones" aria-hidden="true">
            <span class="zone left"></span>
            <span class="zone right"></span>
          </div>
        </article>
      </section>

      <p class="tap-hint" id="tap-hint">tap right to continue &#10132;</p>
      <button id="audio-unlock" class="audio-unlock hidden" type="button">tap to play music</button>
      <audio id="bg-music" src="./assets/song.mp3" preload="auto"></audio>
    </main>

    <script src="./script.js" defer></script>
  </body>
</html>
